name: CI/CD Workflow

on:
  push:
    branches:
      - T1-F-P  # 分发功能监听 T1-F-P 分支的改动

  schedule:
    # 定时触发任务：每天中国时间（UTC+8）的 10:00 和 22:00
    - cron: "0 2 * * *"   # 对应 UTC 时间 02:00（中国时间 10:00）
    - cron: "0 14 * * *"  # 对应 UTC 时间 14:00（中国时间 22:00）

  workflow_dispatch: # 允许手动触发任务

jobs:
  # 分发任务：监听仓库改动并推送到 Gitee、GitLab 和 Gitea
  sync:
    if: github.event_name == 'push'  # 仅在 push 事件触发时运行
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: 验证密钥
      - name: Validate Secrets
        run: |
          missing_secrets=0

          if [ -z "${{ secrets.GITEE_TOKEN }}" ]; then
            echo "❌ ERROR: Missing GITEE_TOKEN secret."
            missing_secrets=$((missing_secrets+1))
          else
            echo "✅ GITEE_TOKEN is available."
          fi

          if [ -z "${{ secrets.GITLAB_TOKEN }}" ]; then
            echo "❌ ERROR: Missing GITLAB_TOKEN secret."
            missing_secrets=$((missing_secrets+1))
          else
            echo "✅ GITLAB_TOKEN is available."
          fi

          if [ -z "${{ secrets.GITEA_LOCAL_TOKEN }}" ]; then
            echo "❌ ERROR: Missing GITEA_LOCAL_TOKEN secret."
            missing_secrets=$((missing_secrets+1))
          else
            echo "✅ GITEA_LOCAL_TOKEN is available."
          fi

          if [ $missing_secrets -ne 0 ]; then
            echo "❌ ERROR: Validation failed. Missing $missing_secrets secrets."
            exit 1
          else
            echo "✅ All required secrets are available."
          fi

      # Step 3: 获取当前 commit SHA
      - name: Get current commit
        id: get_commit
        run: echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      # Step 4: 配置 Gitee 和 GitLab 的凭据
      - name: Setup credentials
        run: |
          git config --global user.name "dongge0210"
          git config --global user.email "dongge0210@163.com"
          # 添加 Gitee 远程仓库
          git remote add gitee https://DonggeML:${{ secrets.GITEE_TOKEN }}@gitee.com/DonggeML/project-monitor-TC.git
          # 添加 GitLab 远程仓库
          git remote add gitlab https://dongge0210:${{ secrets.GITLAB_TOKEN }}@gitlab.com/dongge0210/project-monitor-TC.git
          # 添加 Gitea 作者 远程仓库
          git remote add gitea_author_local http://dongge0210:${{ secrets.GITEA_LOCAL_TOKEN }}@115.231.176.235:3000/dongge0210/project-monitor-TC.git

      # Step 5: 推送到 Gitee
      - name: Push to Gitee
        run: |
          git fetch --unshallow
          git push gitee $COMMIT_SHA:refs/heads/T1-F-P --force

      # Step 6: 推送到 GitLab
      - name: Push to GitLab
        run: |
          git push gitlab $COMMIT_SHA:refs/heads/T1-F-P --force

      # Step 7: 推送到 Gitea_local
      - name: Push to Gitea_local
        run: |
          git push gitea_author_local $COMMIT_SHA:refs/heads/T1-F-P --force

  # .sln 生成任务：每天中国时间 10:00 和 22:00 自动运行
  build-sln:
    if: github.event_name != 'push'  # 避免在 push 事件中触发，只运行定时任务
    runs-on: windows-latest

    steps:
      # Step 1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: 恢复 NuGet 包（如果项目有依赖）
      - name: Restore NuGet packages
        run: |
          nuget restore project-monitor-TC.sln

      # Step 3: 编译解决方案
      - name: Build Solution
        run: |
          msbuild project-monitor-TC.sln /p:Configuration=Debug /p:Platform=x64

      # Step 4: 上传生成的文件（可选）
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-output
          path: ./bin/Debug/x64/
