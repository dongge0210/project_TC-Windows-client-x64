name: Sync to Gitee and GitLab

on:
  push:
    branches:
      - T1-F-P  # 监听 T1-F-P 分支的更新

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: 检出代码（仅允许在特定仓库中运行）
      - name: Checkout code
        if: github.repository == 'dongge0210/project-monitor-TC'
        uses: actions/checkout@v3

      # Step 2: 验证运行环境
      - name: Validate repository
        run: |
          if [[ "${{ github.repository }}" != "dongge0210/project-monitor-TC" ]]; then
            echo "This workflow is not allowed to run outside the original repository."
            exit 1
          fi

      - name: Validate actor
        run: |
          if [[ "${{ github.actor }}" != "dongge0210" ]]; then
            echo "Unauthorized actor. Exiting..."
            exit 1
          fi

      - name: Check secrets
        run: |
          if [ -z "${{ secrets.GITEE_TOKEN }}" ] || [ -z "${{ secrets.GITLAB_TOKEN }}" ] || [ -z "${{ secrets.GITEA_LOCAL_TOKEN }}" ]; then
            echo "Missing required secrets. Exiting..."
            exit 1
          fi

      # Step 3: 配置 Gitee 和 GitLab 的凭据
      - name: Setup credentials
        run: |
          git config --global user.name "dongge0210"
          git config --global user.email "dongge0210@163.com"
          # 添加 Gitee 远程仓库
          git remote add gitee https://DonggeML:${{ secrets.GITEE_TOKEN }}@gitee.com/DonggeML/project-monitor-TC.git
          # 添加 GitLab 远程仓库
          git remote add gitlab https://dongge0210:${{ secrets.GITLAB_TOKEN }}@gitlab.com/dongge0210/project-monitor-TC.git
          # 添加 Gitea 作者 远程仓库
          git remote add gitea_author_local http://dongge0210:${{ secrets.GITEA_LOCAL_TOKEN }}@115.231.176.235:3000/dongge0210/project-monitor-TC

      # Step 4: 推送到 Gitee
      - name: Push to Gitee
        run: |
          git fetch --unshallow
          git push gitee T1-F-P --force

      # Step 5: 推送到 GitLab
      - name: Push to GitLab
        run: |
          git push gitlab T1-F-P --force

      # Step 6: 推送到 Gitea_local
      - name: Push to Gitea_local
        run: |
          git push gitea_author_local T1-F-P --force
